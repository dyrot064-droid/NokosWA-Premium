<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Daftar - NokosWA Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .auth-card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        h2 { margin-bottom: 20px; color: #1c1e21; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; }
        .btn-auth { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .btn-login { background: #128C7E; color: white; }
        .toggle-text { text-align: center; margin-top: 15px; font-size: 0.85rem; color: #555; }
        .toggle-text span { color: #128C7E; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2 id="judulAuth">Masuk Akun</h2>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="nama@email.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button type="button" class="btn-auth btn-login" id="btnAksi" onclick="prosesAuth()">Masuk</button>


        
        <div class="toggle-text" id="toggleText">
            Belum punya akun? <span onclick="ubahMode()">Daftar di sini</span>
        </div>
    </div>

    <script>
        let modeDaftar = false;

        function ubahMode() {
            modeDaftar = !modeDaftar;
            document.getElementById('judulAuth').innerText = modeDaftar ? "Daftar Akun" : "Masuk Akun";
            document.getElementById('btnAksi').innerText = modeDaftar ? "Daftar" : "Masuk";
            document.getElementById('toggleText').innerHTML = modeDaftar ? 
                'Sudah punya akun? <span onclick="ubahMode()">Masuk di sini</span>' : 
                'Belum punya akun? <span onclick="ubahMode()">Daftar di sini</span>';
        }

        function prosesAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if(!email || !pass) return alert("Isi semua kolom!");

            if(modeDaftar) {
                // Proses Daftar (Simpan ke LocalStorage)
                localStorage.setItem('user_email', email);
                localStorage.setItem('user_pass', pass);
                alert("Akun berhasil dibuat! Silakan masuk.");
                ubahMode();
            } else {
                // Proses Login
                const savedEmail = localStorage.getItem('user_email');
                const savedPass = localStorage.getItem('user_pass');

           if(email === savedEmail && pass === savedPass) {
                    alert("Berhasil login!");
                    window.location.href = 'index.html'; // Redirect ke dashboard
                } else {
                    alert("Email atau password salah!");
                }
            }
        }
        function prosesAuth() {
        window.location.href = "home.html";
    }

    </script>
</body>
</html>
